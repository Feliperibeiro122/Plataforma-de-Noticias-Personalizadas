<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de notícias personalizadas </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h1 class="neon-text">PLATAFORMA DE NOTÍCIAS PERSONALIZADAS</h1>

        <div id="auth-form">
           <h2 id="form-title">Login</h2>
           <input type="email" id="email" placeholder="E-mail" required>
           <input type="password" id="password" placeholder="Senha" required>
           
           <input type="text" id="preferences" placeholder="Suas preferências (ex:tech, natureza )" style="display: none;">

           <button onclick="handleAuth()" id="auth-btn">Entrar</button>
           <p onclick="toggleMode()" id="toggle-text">Não tem conta? Cadastre-se</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
